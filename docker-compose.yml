services:
  db:
    image: postgres:15-alpine
    container_name: walpasua-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: walpa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    image: node:20-alpine
    container_name: walpasua-backend
    working_dir: /usr/src/app
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
      DB_NAME: walpa_db
      JWT_SECRET: your-super-secret-jwt-key-for-local-development
      JWT_EXPIRATION: 24h
      NODE_ENV: development
      PORT: 3000
    command: >
      sh -c "
        npm install &&
        npm run start:dev
      "
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: walpasua-frontend
    working_dir: /usr/src/app
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "4200:4200"
    command: sh -c "npm install && npm run start -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  postgres_data:
